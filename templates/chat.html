<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VacaBot · Gestión de Vacaciones</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="chat-shell">
    <header class="chat-header">
      <div class="avatar">VB</div>
      <div>
        <h1>VacaBot</h1>
        <p>Gestión de vacaciones · TPI Organización Empresarial</p>
      </div>
      <button id="reset" class="reset-btn" title="Reiniciar conversación">⟲</button>
    </header>

    <section id="chat" class="chat-log" aria-live="polite">
      {% for msg in saludo %}
        <div class="bubble bot">{{ msg }}</div>
      {% endfor %}
    </section>

    <form id="form" class="chat-input" autocomplete="off">
      <input id="msg" type="text" placeholder="Escribi tu mensaje..." autofocus>
      <button type="submit">Enviar</button>
    </form>
  </main>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('msg');
    const btnReset = document.getElementById('reset');

    function append(texto, who) {
      const div = document.createElement('div');
      div.className = 'bubble ' + who;
      div.textContent = texto;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const mensaje = input.value.trim();
      if (!mensaje) return;
      append(mensaje, 'user');
      input.value = '';
      input.disabled = true;
      try {
        const r = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({mensaje})
        });
        const data = await r.json();
        for (const m of data.respuestas) append(m, 'bot');
        if (data.fin) {
          input.placeholder = 'Sesión finalizada. Tocá ⟲ para reiniciar.';
          input.disabled = true;
          return;
        }
      } catch (err) {
        append('Error de conexión: ' + err.message, 'bot');
      }
      input.disabled = false;
      input.focus();
    });

    btnReset.addEventListener('click', async () => {
      await fetch('/api/reset', {method: 'POST'});
      location.reload();
    });
  </script>
</body>
</html>
